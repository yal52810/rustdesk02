name: Build Production Images

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================================
  # Web (API + Vue 前端)
  # ============================================================
  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.optimized
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # 构建 Rust 二进制 (hbbs + hbbr)
  # ============================================================
  build-rust:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build hbbs + hbbr
        working-directory: rustdesk-server
        run: cargo build --release --bin hbbs --bin hbbr

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-binaries
          path: |
            rustdesk-server/target/release/hbbs
            rustdesk-server/target/release/hbbr

  # ============================================================
  # ID 镜像 (hbbs)
  # ============================================================
  build-id:
    needs: build-rust
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: rustdesk-binaries
          path: rustdesk-server/target/release

      - name: Make binaries executable
        run: chmod +x rustdesk-server/target/release/hbbs rustdesk-server/target/release/hbbr

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ID image
        uses: docker/build-push-action@v6
        with:
          context: ./rustdesk-server
          file: ./Dockerfile.id
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}-id:latest

  # ============================================================
  # Relay 镜像 (hbbr)
  # ============================================================
  build-relay:
    needs: build-rust
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: rustdesk-binaries
          path: rustdesk-server/target/release

      - name: Make binaries executable
        run: chmod +x rustdesk-server/target/release/hbbs rustdesk-server/target/release/hbbr

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Relay image
        uses: docker/build-push-action@v6
        with:
          context: ./rustdesk-server
          file: ./Dockerfile.relay
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}-relay:latest
