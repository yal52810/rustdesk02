networks:
  rustdesk-net:
    external: false

services:
  rustdesk:
    image: lejianwen/rustdesk-server-s6:latest
    container_name: rustdesk-s6
    environment:
      - RELAY=api.seset.xyz
      - ENCRYPTED_ONLY=1
      # 如果你想强制登录使用，这里可以改回 Y
      - MUST_LOGIN=N 
      - TZ=Asia/Shanghai
      - RUSTDESK_API_RUSTDESK_ID_SERVER=api.seset.xyz
      - RUSTDESK_API_RUSTDESK_RELAY_SERVER=api.seset.xyz
      - RUSTDESK_API_RUSTDESK_API_SERVER=https://api.seset.xyz
      - RUSTDESK_API_JWT_KEY=12345678
      # 开启原生 WSS 强制模式
      - RUSTDESK_API_RUSTDESK_FORCE_WSS=true
    volumes:
      # 为了保留你的数据库和密钥记忆，我们映射现有的 docker volumes
      - id_data:/data
      - web_data:/app/data
    networks:
      - rustdesk-net
    restart: unless-stopped

  nginx:
    container_name: rustdesk-nginx-docs
    image: nginx:alpine
    ports:
      - 80:80
      - 443:443
    volumes:
      # 映射我们的文档专用 nginx 配置
      - ./nginx-docs.conf:/etc/nginx/conf.d/default.conf:ro
      # 挂载宿主机的证书 (非常关键，否则 SSL 报错)
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - rustdesk-net
    restart: unless-stopped
    depends_on:
      - rustdesk

volumes:
  id_data:
  web_data:
