# ============================================
# RustDesk Nginx 反向代理 - HTTPS + WebSocket
# 参考: https://github.com/lejianwen/rustdesk-api/wiki/All-In-HTTPS-Websocket
# ============================================
# 所有流量统一走 443:
#   /         → API:21114 (管理后台 + Web客户端)
#   /ws/id    → hbbs:21118 (ID WebSocket)
#   /ws/relay → hbbr:21119 (Relay WebSocket)
# ============================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 65535;
    use epoll;
    multi_accept on;
}

# ============================================
# Stream 模块 - TCP 中继 (21117)
# ============================================
stream {
    log_format tcp '$remote_addr [$time_local] $status '
                   '$bytes_sent $bytes_received $session_time '
                   '"$upstream_addr"';

    access_log /var/log/nginx/tcp_access.log tcp;

    upstream relay_tcp_backend {
        server relay:21117 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 21117;
        proxy_pass relay_tcp_backend;
        proxy_connect_timeout 10s;
        proxy_timeout 300s;
    }
}

# ============================================
# HTTP 模块
# ============================================
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 100m;

    # ==========================================
    # HTTP → HTTPS 重定向
    # ==========================================
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ==========================================
    # HTTPS + WSS 主配置
    # ==========================================
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL 证书
        ssl_certificate     /etc/letsencrypt/live/frptest.f11.yoga/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/frptest.f11.yoga/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        server_tokens off;

        # ======================================
        # API 管理后台 + Web 客户端
        # ======================================
        location / {
            proxy_pass http://web:21114;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ======================================
        # WebSocket - ID Server (hbbs)
        # 客户端通过 wss://domain/ws/id 连接
        # ======================================
        location /ws/id {
            proxy_pass http://hbbs:21118;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ======================================
        # WebSocket - Relay Server (hbbr)
        # 客户端通过 wss://domain/ws/relay 连接
        # ======================================
        location /ws/relay {
            proxy_pass http://relay:21119;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
