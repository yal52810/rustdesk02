version: '3.8'

# 使用 GitHub Container Registry 预构建镜像
# 镜像地址: ghcr.io/yal52810/rustdesk-supervise-web:latest
#          ghcr.io/yal52810/rustdesk-supervise-relay:latest

services:
  # Web 管理后台 (使用 GHCR 镜像)
  web:
    image: ghcr.io/yal52810/rustdesk-supervise-web:latest
    container_name: rustdesk-web
    restart: always
    environment:
      - RUSTDESK_API_GIN_RESOURCES_PATH=/app/resources
      - TZ=Asia/Shanghai
      - GIN_MODE=release
    volumes:
      - web_data:/app/data
      - web_logs:/app/runtime/logs
      - ./rustdesk-api/conf:/app/conf:ro
    networks:
      - rustdesk-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:21114/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  # 中继服务器 1 (使用 GHCR 镜像)
  relay1:
    image: ghcr.io/yal52810/rustdesk-supervise-relay:latest
    container_name: rustdesk-relay1
    restart: always
    environment:
      - TZ=Asia/Shanghai
      - RELAY_KEY=${RELAY_KEY:-egwxkaHGAM4MnitF1eP56rJWTAwIUrJCNeCXaArbCrc=}
    networks:
      - rustdesk-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "21117"]
      interval: 30s
      timeout: 3s
      retries: 3

  # 中继服务器 2 (使用 GHCR 镜像)
  relay2:
    image: ghcr.io/yal52810/rustdesk-supervise-relay:latest
    container_name: rustdesk-relay2
    restart: always
    environment:
      - TZ=Asia/Shanghai
      - RELAY_KEY=${RELAY_KEY:-egwxkaHGAM4MnitF1eP56rJWTAwIUrJCNeCXaArbCrc=}
    networks:
      - rustdesk-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "21117"]
      interval: 30s
      timeout: 3s
      retries: 3

  # 中继服务器 3 (使用 GHCR 镜像)
  relay3:
    image: ghcr.io/yal52810/rustdesk-supervise-relay:latest
    container_name: rustdesk-relay3
    restart: always
    environment:
      - TZ=Asia/Shanghai
      - RELAY_KEY=${RELAY_KEY:-egwxkaHGAM4MnitF1eP56rJWTAwIUrJCNeCXaArbCrc=}
    networks:
      - rustdesk-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "21117"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Nginx 负载均衡器
  nginx:
    image: nginx:alpine
    container_name: rustdesk-nginx
    restart: always
    ports:
      - "21117:21117"
      - "443:443"
    volumes:
      - ./nginx-lb.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    networks:
      - rustdesk-network
    depends_on:
      - relay1
      - relay2
      - relay3
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  rustdesk-network:
    driver: bridge

volumes:
  web_data:
  web_logs:
  nginx_logs:
