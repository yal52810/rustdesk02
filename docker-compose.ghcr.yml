# ============================================
# RustDesk 完整部署 - HTTPS + WebSocket
# 域名: ${DOMAIN:-api.seset.xyz}
# 镜像由 GitHub Actions 自动构建并推送到 GHCR
# ============================================
# 环境变量在 .env 文件中配置:
#   DOMAIN    - 部署域名 (必填)
#   ID_KEY    - RustDesk Key (可选)
#   RELAY_KEY - 中继密钥 (可选)
# ============================================

services:
  # ========================================
  # ID 服务器 (hbbs) - 端口 21116/21118
  # ========================================
  hbbs:
    image: ghcr.io/yal52810/rustdesk-supervise-id:latest
    container_name: rustdesk-hbbs
    restart: always
    command: hbbs -k ${ID_KEY:-_} -r ${DOMAIN:-api.seset.xyz}:21117
    environment:
      - TZ=Asia/Shanghai
      - RELAY_HOST=${DOMAIN:-api.seset.xyz}
      - REDIS_URL=redis://redis:6379/
    volumes:
      - id_data:/data
    networks:
      - rustdesk-network
    depends_on:
      redis:
        condition: service_healthy

  # ========================================
  # Web 管理后台 (API + Vue前端) - 端口 21114
  # ========================================
  web:
    image: ghcr.io/yal52810/rustdesk-supervise-web:latest
    container_name: rustdesk-web
    restart: always
    # 临时绕过 entrypoint.sh (已修复，等GitHub Actions重建后可移除)
    entrypoint: ["/usr/local/bin/apimain"]
    environment:
      - RUSTDESK_API_GIN_RESOURCES_PATH=/app/resources
      - TZ=Asia/Shanghai
      - GIN_MODE=release
      # 域名配置 (通过 .env DOMAIN 变量统一管理)
      - RUSTDESK_ID_SERVER=${DOMAIN:-api.seset.xyz}
      - RUSTDESK_RELAY_SERVER=${DOMAIN:-api.seset.xyz}
      # ⚠️ 必须 https:// 前缀, 否则客户端不启用 WSS
      - RUSTDESK_API_SERVER=https://${DOMAIN:-api.seset.xyz}
      - RUSTDESK_WS_HOST=wss://${DOMAIN:-api.seset.xyz}
      - RUSTDESK_FORCE_WSS=false
      - RUSTDESK_KEY=${ID_KEY:-}
    volumes:
      - web_data:/app/data
      - web_logs:/app/runtime/logs
      - ./rustdesk-api/conf:/app/conf:ro
    networks:
      - rustdesk-network
    depends_on:
      redis:
        condition: service_healthy
      hbbs:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:21114/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  # ========================================
  # 中继服务器 (hbbr) - 端口 21117/21119
  # ========================================
  relay:
    image: ghcr.io/yal52810/rustdesk-supervise-relay:latest
    container_name: rustdesk-relay
    restart: always
    environment:
      - TZ=Asia/Shanghai
      - RELAY_KEY=${RELAY_KEY:-egwxkaHGAM4MnitF1eP56rJWTAwIUrJCNeCXaArbCrc=}
    networks:
      - rustdesk-network

  # ========================================
  # Nginx 反向代理 (HTTPS/WSS 终端)
  # 启动时自动替换 __DOMAIN__ → 实际域名
  # ========================================
  nginx:
    image: nginx:alpine
    container_name: rustdesk-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "21117:21117"
    environment:
      - DOMAIN=${DOMAIN:-api.seset.xyz}
    entrypoint:
      [
        "/bin/sh",
        "-c",
        "sed \"s/__DOMAIN__/$$DOMAIN/g\" /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf && exec nginx -g 'daemon off;'",
      ]
    volumes:
      - ./nginx-lb.conf.template:/etc/nginx/nginx.conf.template:ro
      - ./certs:/etc/letsencrypt
      - nginx_logs:/var/log/nginx
    networks:
      - rustdesk-network
    depends_on:
      - web
      - hbbs
      - relay

  # ========================================
  # acme.sh 自动证书续期 (Cloudflare DNS)
  # 首次: source cf.env && bash init-certs.sh 签发证书
  # 之后 acme 容器会每 60 天自动续期
  # ========================================
  acme:
    image: neilpang/acme.sh:latest
    container_name: rustdesk-acme
    restart: always
    environment:
      - CF_Token=${CF_Token:-}
      - CF_Account_ID=${CF_Account_ID:-}
    volumes:
      - acme_data:/acme.sh
      - ./certs:/etc/letsencrypt
    command: daemon --reloadcmd "touch /etc/letsencrypt/.renewed"
    networks:
      - rustdesk-network

  # ========================================
  # Redis - 服务器拓扑共享 + 会话缓存
  # ========================================
  redis:
    image: redis:7-alpine
    container_name: rustdesk-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - rustdesk-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  rustdesk-network:
    driver: bridge

volumes:
  id_data:
  web_data:
  web_logs:
  nginx_logs:
  acme_data:
  redis_data:
